general = {
	 // Name is overridden at startup from addon config
	 name = "Home Assistant";
	 ignore_volume_control = "no";
	 mdns_backend = "avahi";
	 interface = "enu1";
};

pulseaudio = {
	 // Write to the PulseAudio null sink — LedFx reads the monitor
	 output_device = "ledfx_sink";
};

